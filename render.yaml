services:
  - type: web
    name: narinakhre-test
    plan: starter
    runtime: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    autoDeployTrigger: commit
    domains:
      - test-retail.narinakhre.com
      - test-wholesale.narinakhre.com
    envVars:
      - key: SUPABASE_URL
        value: https://hkbyejqctqnywirjawai.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false