services:
  - type: web
    name: narinakhre-test
    plan: Free
    runtime: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    domains:
      - test-retail.narinakhre.com
      - test-wholesale.narinakhre.com

  - type: web
    name: narinakhre-production
    plan: Starter
    runtime: python
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    domains:
      - narinakhre.com
      - www.narinakhre.com
      - wholesale.narinakhre.com
