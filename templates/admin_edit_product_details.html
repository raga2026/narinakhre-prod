{% extends "base.html" %}
{% block content %}
<div style="margin-bottom: 20px;">
  <a href="{{ url_for('admin') }}" class="btn-save" style="background:#be185d; color:white; padding:8px 18px; border-radius:8px; font-weight:bold;">Back to Admin</a>
</div>
<style>
    body { background-color: #0f172a; color: white; font-family: sans-serif; }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    h1 { color: #f8fafc; border-bottom: 2px solid #be185d; padding-bottom: 10px; margin-bottom: 20px; }
    .bulk-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
    .bulk-table th { background: #334155; color: #cbd5e1; padding: 12px; text-align: left; font-size: 0.85rem; text-transform: uppercase; }
    .bulk-table td { padding: 10px; border-bottom: 1px solid #334155; vertical-align: middle; }
    .table-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #be185d; }
    .bulk-input { width: 100px; padding: 6px; border-radius: 6px; border: 1px solid #be185d; background: #0f172a; color: white; font-size: 0.85rem; }
    .btn-save { background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-right: 5px; }
    .btn-save:hover { background: #059669; }
</style>
<div class="admin-container">
  <h1>Edit Product Details</h1>
  <table class="bulk-table">
    <thead>
      <tr>
        <th>Preview</th>
        <th>SKU</th>
        <th>Name</th>
        <th>Description</th>
        <th>HSN</th>
        <th>GST</th>
        <th>Category</th>
        <th>Subcategory</th>
        <th>Sizes</th>
        <th>Material</th>
        <th>Colour</th>
        <th>Save</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
      <tr>
        <form method="post" action="{{ url_for('admin_edit_product_details') }}">
          <td><img class="table-img" src="/static/assets/products/{{ product.sku }}_1.jpg" onerror="this.src='/static/assets/products/default.jpg'"></td>
          <td style="font-weight:bold; color:#f472b6;">
            <input type="hidden" name="sku" value="{{ product.sku }}">{{ product.sku }}
          </td>
          <td><input type="text" name="name" value="{{ product.name }}" class="bulk-input" required></td>
          <td><input type="text" name="description" value="{{ product.description }}" class="bulk-input"></td>
          <td><input type="text" name="hsn" value="{{ product.hsn }}" class="bulk-input"></td>
          <td><input type="number" step="0.01" name="gst" value="{{ product.gst }}" class="bulk-input"></td>
          <td><input type="text" name="category" value="{{ product.category }}" class="bulk-input"></td>
          <td><input type="text" name="subcategory" value="{{ product.subcategory }}" class="bulk-input"></td>
          <td><input type="text" name="sizes" value="{{ product.sizes }}" class="bulk-input"></td>
          <td><input type="text" name="material" value="{{ product.material }}" class="bulk-input"></td>
          <td><input type="text" name="color" value="{{ product.color }}" class="bulk-input"></td>
          <td><button type="submit" class="btn-save">Save</button></td>
        </form>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
