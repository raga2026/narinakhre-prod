<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NariNakhre Product Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold mb-8 text-center">Product Gallery</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for product in products %}
            <div class="bg-white rounded shadow p-4">
                <div class="flex flex-col items-center">
                    <div class="mb-4">
                        {% for img in product.images %}
                        <img src="/{{ img }}" alt="{{ product.sku }}" class="w-32 h-32 object-cover rounded mb-2">
                        {% endfor %}
                    </div>
                    <h2 class="text-xl font-semibold">{{ product.name }}</h2>
                    <p class="text-gray-600">SKU: {{ product.sku }}</p>
                    <p class="text-gray-600">Material: {{ product.material }}</p>
                    <p class="text-gray-600">Color: {{ product.color }}</p>
                    <p class="text-gray-600">Sizes: {{ product.sizes }}</p>
                    <p class="text-gray-600 mt-2">{{ product.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
