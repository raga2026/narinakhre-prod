<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NariNakhre</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #fff; color: #0f172a; }
        .rose-btn { background: linear-gradient(90deg, #be185d 0%, #f43f5e 100%); color: white; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="max-w-md mx-auto bg-slate-800/50 rounded-2xl shadow-xl p-8 border border-pink-500/20">
        <div class="flex flex-col items-center mb-6">
            <img src="https://eopqwvssznmxfxrfzqbx.supabase.co/storage/v1/object/public/products/site/logo.png" alt="Nari Nakhre Logo" class="h-16 w-auto mb-2 rounded-lg shadow-lg" style="background:#fff;object-fit:contain;">
            <h1 class="text-2xl font-extrabold rose-accent text-center">Login to Nari Nakhre</h1>
        </div>
        </body>
        <div class="flex justify-center mt-6">
            <a href="{{ url_for('admin_dashboard') }}" class="rose-btn px-6 py-3 rounded-xl font-bold text-lg shadow-lg" aria-label="Admin Panel">Admin Panel</a>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
            <div>
                <label for="whatsapp" class="block text-sm font-bold mb-1 text-pink-300">WhatsApp Number</label>
                <input type="text" id="whatsapp" name="whatsapp" placeholder="Enter 10-digit Phone Number" required pattern="\d{10}" maxlength="10" minlength="10" class="w-full bg-slate-900 border border-pink-500/30 rounded-xl p-3 text-white" inputmode="numeric" oninput="this.value=this.value.replace(/[^\d]/g,'').slice(0,10)">
            </div>
            <div>
                <label for="password" class="block text-sm font-bold mb-1 text-pink-300">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required class="w-full bg-slate-900 border border-pink-500/30 rounded-xl p-3 text-white">
            </div>
            <button type="submit" class="rose-btn w-full py-4 rounded-2xl font-bold text-xl shadow-lg glow-pink">Login</button>
        </form>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mt-6">
            {% for category, msg in messages %}
                <div class="bg-pink-900/30 text-pink-200 rounded-xl p-3 mb-2">{{ msg }}</div>
            {% endfor %}
            </div>
        {% endif %}
        {% endwith %}
    </div>
</body>
</html>
