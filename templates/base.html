<!DOCTYPE html>
<html lang="en">
<head>
    {% block meta %}{% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nari Nakhre{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
    {% block meta_description %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* ── Shared base styles ── */
        body { color: #312e2e; font-family: 'Merriweather', 'Georgia', serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .rose-accent { color: #be185d; }
        .hidden { display: none; }
        .btn-retail-main {
            background: linear-gradient(90deg, #be185d 0%, #f472b6 100%);
            color: #fff !important; border-radius: 30px; font-weight: bold;
            transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(190,24,93,0.2);
            text-align: center; border: none; display: inline-block;
        }
        .btn-black { background: #000; color: #fff; border-radius: 12px; font-weight: bold; transition: 0.3s; }
    </style>

    {% block extra_styles %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen {% block body_class %}{% endblock %}">

    {% block header %}{% endblock %}

    <main class="{% block main_class %}flex-grow{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}{% endblock %}

    <script src="/static/js/cart_global.js"></script>
    <script src="/static/js/retail_unit_counter.js"></script>
    <script src="/static/js/retail_cart_state.js"></script>

    <script>
    /* ── Shared: sync cart count ── */
    function syncCartCount(count) {
        const d = document.getElementById('cart-count');
        const m = document.getElementById('cart-count-mobile');
        if (d) d.innerText = count;
        if (m) m.innerText = count;
    }

    /* ── Shared: retail cart actions ── */
    function retailAddToCart(btn) {
        const container = btn.closest('.cart-container');
        const sku = btn.getAttribute('data-sku');
        const price = btn.getAttribute('data-price');
        let size = 'Standard';
        const sizeSelect = container.querySelector('.size-select') || document.getElementById('size-main');
        if (sizeSelect) size = sizeSelect.value;
        fetch('/update-cart', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: sku, qty: 1, price: price, size: size }) })
        .then(r => r.json()).then(data => {
            if (data.status === 'success') {
                syncCartCount(data.new_total || data.cart_count || '1');
                btn.classList.add('hidden');
                const counter = container.querySelector('.unit-counter');
                if (counter) {
                    counter.classList.remove('hidden');
                    const qd = counter.querySelector('.qty-display');
                    if (qd) qd.innerText = '1';
                }
            }
        });
    }
    function retailIncrement(btn) {
        const container = btn.closest('.cart-container');
        const counter = btn.closest('.unit-counter');
        const sku = container.querySelector('.add-to-cart-btn').getAttribute('data-sku');
        const price = container.querySelector('.add-to-cart-btn').getAttribute('data-price');
        let size = 'Standard';
        const sizeSelect = container.querySelector('.size-select') || document.getElementById('size-main');
        if (sizeSelect) size = sizeSelect.value;
        let qty = parseInt(counter.querySelector('.qty-display').innerText) || 1;
        qty += 1;
        fetch('/update-cart', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: sku, qty: qty, price: price, size: size }) })
        .then(r => r.json()).then(data => {
            if (data.status === 'success') {
                counter.querySelector('.qty-display').innerText = qty;
                syncCartCount(data.new_total || data.cart_count || '1');
            }
        });
    }
    function retailDecrement(btn) {
        const container = btn.closest('.cart-container');
        const counter = btn.closest('.unit-counter');
        const addBtn = container.querySelector('.add-to-cart-btn');
        const sku = addBtn.getAttribute('data-sku');
        const price = addBtn.getAttribute('data-price');
        let size = 'Standard';
        const sizeSelect = container.querySelector('.size-select') || document.getElementById('size-main');
        if (sizeSelect) size = sizeSelect.value;
        let qty = parseInt(counter.querySelector('.qty-display').innerText) || 1;
        if (qty <= 1) {
            fetch('/update-cart', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: sku, qty: 0, price: price, size: size }) })
            .then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    counter.classList.add('hidden');
                    if (addBtn) addBtn.classList.remove('hidden');
                    syncCartCount(data.new_total || data.cart_count || '0');
                }
            });
            return;
        }
        qty -= 1;
        fetch('/update-cart', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: sku, qty: qty, price: price, size: size }) })
        .then(r => r.json()).then(data => {
            if (data.status === 'success') {
                counter.querySelector('.qty-display').innerText = qty;
                syncCartCount(data.new_total || data.cart_count || '1');
            }
        });
    }
    function retailBuyNow(btn) {
        const container = btn.closest('.cart-container');
        const sku = btn.getAttribute('data-sku');
        const price = btn.getAttribute('data-price');
        let size = 'Standard';
        const sizeSelect = container.querySelector('.size-select') || document.getElementById('size-main');
        if (sizeSelect) size = sizeSelect.value;
        let qty = 1;
        const counter = container.querySelector('.unit-counter');
        if (counter && !counter.classList.contains('hidden')) {
            qty = parseInt(counter.querySelector('.qty-display').innerText) || 1;
        }
        fetch('/update-cart', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: sku, qty: qty, price: price, size: size }) })
        .then(r => r.json()).then(data => {
            if (data.status === 'success') {
                syncCartCount(data.new_total || data.cart_count || '1');
                window.location.href = '/retail/checkout';
            }
        });
    }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
