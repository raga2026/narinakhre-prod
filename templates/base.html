<!DOCTYPE html>
<html lang="en">
<head>

    {% block meta %}{% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nari Nakhre | Premium Ethnic Jewelry & Accessories Wholesaler</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
    <meta name="description" content="Wholesale Indian jewelry, bridal sets, and traditional bangles. Shop premium ethnic accessories for weddings, festivals, and special occasions.">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:title" content="Nari Nakhre | Premium Ethnic Jewelry & Accessories Wholesaler">
    <meta property="og:description" content="Wholesale Indian jewelry, bridal sets, and traditional bangles. Shop premium ethnic accessories for weddings, festivals, and special occasions.">
    <meta property="og:image" content="https://raga2026.pythonanywhere.com/static/assets/logo.png">
    <meta property="og:url" content="https://raga2026.pythonanywhere.com">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nari Nakhre | Premium Ethnic Jewelry & Accessories Wholesaler">
    <meta name="twitter:description" content="Wholesale Indian jewelry, bridal sets, and traditional bangles. Shop premium ethnic accessories for weddings, festivals, and special occasions.">
    <meta name="twitter:image" content="https://raga2026.pythonanywhere.com/static/assets/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .rose-accent { color: #f472b6; }
        .nav-btn {
            background: #be185d;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="flex items-center gap-2">
            <img src="/static/assets/logo.png" alt="Logo" style="height:40px; background:white; padding:2px; border-radius:4px;">
            <span class="text-xl font-bold rose-accent">NariNakhre</span>
        </a>
        <nav class="flex gap-3 items-center relative">
            <div class="relative group">
                <button class="nav-btn" id="categories-dropdown-btn" aria-haspopup="true" aria-expanded="false">
                    Categories
                    <svg class="inline ml-1" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div class="hidden group-hover:block group-focus-within:block absolute z-50 mt-2 w-48 bg-white text-black rounded-lg shadow-lg border border-gray-200 transition-all duration-150" id="categories-dropdown-menu">
                    {% for cat in categories %}
                        <a href="{{ url_for('category_products', category=cat) }}" class="block px-4 py-2 hover:bg-rose-100 hover:text-rose-600 transition">{{ cat }}</a>
                    {% endfor %}
                </div>
            </div>
            <a href="{{ url_for('admin_login') }}" class="nav-btn">Admin</a>
            <a href="{{ url_for('checkout') }}" class="nav-btn">Cart</a>
        </nav>
        <style>
            /* Dropdown styles */
            #categories-dropdown-btn:focus + #categories-dropdown-menu,
            #categories-dropdown-menu:hover,
            #categories-dropdown-menu:focus-within {
                display: block !important;
            }
            @media (max-width: 768px) {
                .group:hover .group-hover\:block { display: none !important; }
                .group:focus-within .group-hover\:block { display: block !important; }
            }
        </style>
    </header>

    <main class="container mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/cart_global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quote-actions.js') }}"></script>
</body>
</html>
