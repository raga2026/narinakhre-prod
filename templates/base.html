<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NariNakhre{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .rose-accent { color: #f472b6; }
        .nav-btn {
            background: #be185d;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="flex items-center gap-2">
            <img src="/static/assets/logo.png" alt="Logo" style="height:40px; background:white; padding:2px; border-radius:4px;">
            <span class="text-xl font-bold rose-accent">NariNakhre</span>
        </a>
        <nav class="flex gap-3">
            <a href="{{ url_for('admin_login') }}" class="nav-btn">Admin</a>
            <a href="{{ url_for('checkout') }}" class="nav-btn">Cart</a>
        </nav>
    </header>

    <main class="container mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
