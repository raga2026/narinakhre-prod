<!DOCTYPE html>
<html lang="en">
<head>
    {% block meta %}{% endblock %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nari Nakhre{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/logo.png') }}">
    {% block meta_description %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { color: #312e2e; font-family: 'Merriweather', Georgia, serif; scroll-behavior: smooth; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .rose-accent { color: #be185d; }
        .hidden { display: none !important; }
        .btn-retail-main {
            background: linear-gradient(90deg, #be185d 0%, #f472b6 100%);
            color: #fff !important; border-radius: 30px; font-weight: bold;
            transition: all 0.3s; box-shadow: 0 4px 12px rgba(190,24,93,0.2);
            text-align: center; border: none; display: inline-block;
        }
        .btn-black { background: #000; color: #fff; border-radius: 12px; font-weight: bold; transition: 0.3s; }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen {% block body_class %}{% endblock %}">

{% block header %}{% endblock %}

<main class="{% block main_class %}flex-grow{% endblock %}">
    {% block content %}{% endblock %}
</main>

{% block footer %}{% endblock %}

<script src="/static/js/cart_global.js"></script>
<script src="/static/js/retail_unit_counter.js"></script>
<script src="/static/js/retail_cart_state.js"></script>
<script>
function syncCartCount(count) {
    ['cart-count','cart-count-mobile'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerText = count;
    });
}
function retailAddToCart(btn) {
    const c = btn.closest('.cart-container');
    const sku = btn.getAttribute('data-sku'), price = btn.getAttribute('data-price');
    const ss = c.querySelector('.size-select') || document.getElementById('size-main');
    const size = ss ? ss.value : 'Standard';
    fetch('/update-cart', {method:'POST',headers:{'Content-Type':'application/json'},
        body: JSON.stringify({product_id:sku,qty:1,price,size})})
    .then(r=>r.json()).then(d=>{
        if(d.status==='success'){
            syncCartCount(d.new_total||d.cart_count||'1');
            btn.classList.add('hidden');
            const uc = c.querySelector('.unit-counter');
            if(uc){uc.classList.remove('hidden'); const qd=uc.querySelector('.qty-display'); if(qd)qd.innerText='1';}
        }
    });
}
function retailIncrement(btn) {
    const c = btn.closest('.cart-container'), uc = btn.closest('.unit-counter');
    const ab = c.querySelector('.add-to-cart-btn');
    const sku = ab.getAttribute('data-sku'), price = ab.getAttribute('data-price');
    const ss = c.querySelector('.size-select') || document.getElementById('size-main');
    const size = ss ? ss.value : 'Standard';
    let qty = parseInt(uc.querySelector('.qty-display').innerText)||1; qty++;
    fetch('/update-cart',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({product_id:sku,qty,price,size})})
    .then(r=>r.json()).then(d=>{
        if(d.status==='success'){uc.querySelector('.qty-display').innerText=qty; syncCartCount(d.new_total||d.cart_count||'1');}
    });
}
function retailDecrement(btn) {
    const c = btn.closest('.cart-container'), uc = btn.closest('.unit-counter');
    const ab = c.querySelector('.add-to-cart-btn');
    const sku = ab.getAttribute('data-sku'), price = ab.getAttribute('data-price');
    const ss = c.querySelector('.size-select') || document.getElementById('size-main');
    const size = ss ? ss.value : 'Standard';
    let qty = parseInt(uc.querySelector('.qty-display').innerText)||1;
    if(qty<=1){
        fetch('/update-cart',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({product_id:sku,qty:0,price,size})})
        .then(r=>r.json()).then(d=>{
            if(d.status==='success'){uc.classList.add('hidden'); ab.classList.remove('hidden'); syncCartCount(d.new_total||d.cart_count||'0');}
        }); return;
    }
    qty--;
    fetch('/update-cart',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({product_id:sku,qty,price,size})})
    .then(r=>r.json()).then(d=>{
        if(d.status==='success'){uc.querySelector('.qty-display').innerText=qty; syncCartCount(d.new_total||d.cart_count||'1');}
    });
}
function retailBuyNow(btn) {
    const c = btn.closest('.cart-container');
    const sku = btn.getAttribute('data-sku'), price = btn.getAttribute('data-price');
    const ss = c.querySelector('.size-select') || document.getElementById('size-main');
    const size = ss ? ss.value : 'Standard';
    const uc = c.querySelector('.unit-counter');
    const qty = (uc && !uc.classList.contains('hidden')) ? (parseInt(uc.querySelector('.qty-display').innerText)||1) : 1;
    fetch('/update-cart',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({product_id:sku,qty,price,size})})
    .then(r=>r.json()).then(d=>{
        if(d.status==='success'){syncCartCount(d.new_total||d.cart_count||'1'); window.location.href='/retail/checkout';}
    });
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
