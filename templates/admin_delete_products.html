{% extends "base.html" %}
{% block title %}Delete Products{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Delete Products</h1>
<form method="post" action="{{ url_for('admin_delete_products') }}">
    <table class="table-auto w-full mb-4">
        <thead>
            <tr>
                <th><input type="checkbox" id="select-all"></th>
                <th>SKU</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
        {% for product in products %}
            <tr>
                <td><input type="checkbox" name="product_ids" value="{{ product.id }}"></td>
                <td>{{ product.sku }}</td>
                <td>{{ product.name }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <button type="submit" class="bg-red-600 text-white px-4 py-2 rounded">Delete Selected</button>
</form>
<script>
    document.getElementById('select-all').addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('input[name="product_ids"]');
        for (const cb of checkboxes) {
            cb.checked = this.checked;
        }
    });
</script>
{% endblock %}
